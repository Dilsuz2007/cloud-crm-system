name: texstyle-crm

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-to-at-least-32-characters}
      DATABASE_URL: sqlite:////data/texstyle_crm.db
    volumes:
      - texstyle_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 3000
    ports:
      - "3003:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  texstyle_data:
    external: true
    name: texstyle_crm_data
